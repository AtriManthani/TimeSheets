services:
  postgres:
    image: postgres:16-alpine
    container_name: timeflux_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: timeflux
    ports:
      - "5432:5432"
    volumes:
      - timeflux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  timeflux_pgdata:
